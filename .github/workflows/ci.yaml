name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    name: ${{ matrix.os }} quality gates
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        if: runner.os != 'Windows'
        run: pnpm test

      - name: Test (Windows — agent-core only, skip stdio spawn tests)
        if: runner.os == 'Windows'
        run: pnpm --dir packages/agent-core test

      - name: Build shared + agent-core
        run: pnpm -r --filter @super-excellent/shared --filter @super-excellent/agent-core build

      - name: Build desktop web app
        run: pnpm --dir apps/desktop build

  desktop-builds:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    needs: quality-gates
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            build-label: macos
          - name: Windows MSI
            os: windows-latest
            build-label: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + agent-core
        run: pnpm -r --filter @super-excellent/shared --filter @super-excellent/agent-core build

      - name: Remove updater signing requirement for CI
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const f = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(f,'utf8'));
            if (c.plugins?.updater) delete c.plugins.updater.pubkey;
            fs.writeFileSync(f, JSON.stringify(c, null, 4));
          "

      - name: Tauri build
        run: pnpm --dir apps/desktop tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ matrix.build-label }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
