name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + agent-core
        run: pnpm -r --filter @super-excellent/shared --filter @super-excellent/agent-core build

      - name: Tauri build (macOS)
        run: pnpm --dir apps/desktop tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    name: Windows MSI
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + agent-core
        run: pnpm -r --filter @super-excellent/shared --filter @super-excellent/agent-core build

      - name: Tauri build (Windows MSI)
        run: pnpm --dir apps/desktop tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Generate latest.json for Tauri updater
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/super-excellent.app.tar.gz",
                "signature": ""
              },
              "darwin-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/super-excellent.app.tar.gz",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/super-excellent_${VERSION}_x64-setup.exe",
                "signature": ""
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos/**/*
            artifacts/windows/**/*
            artifacts/latest.json
