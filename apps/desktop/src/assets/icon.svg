<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Circuit lines -->
  <g stroke="#2a2a5e" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M100,256 H200 M312,256 H412"/>
    <path d="M256,100 V200 M256,312 V412"/>
    <path d="M150,150 L200,200 M312,312 L362,362"/>
    <path d="M362,150 L312,200 M200,312 L150,362"/>
    <circle cx="200" cy="256" r="4" fill="#4a4a8e"/>
    <circle cx="312" cy="256" r="4" fill="#4a4a8e"/>
    <circle cx="256" cy="200" r="4" fill="#4a4a8e"/>
    <circle cx="256" cy="312" r="4" fill="#4a4a8e"/>
  </g>
  
  <!-- Star glow -->
  <polygon points="256,80 296,200 420,200 316,272 348,392 256,320 164,392 196,272 92,200 216,200" 
    fill="#FFD700" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Main star -->
  <polygon points="256,100 290,200 400,200 310,264 340,376 256,310 172,376 202,264 112,200 222,200" 
    fill="url(#star)" filter="url(#shadow)"/>
  
  <!-- Inner star highlight -->
  <polygon points="256,140 280,210 360,210 296,256 320,340 256,296 192,340 216,256 152,210 232,210" 
    fill="#FFE44D" opacity="0.3"/>
  
  <!-- Center circle (AI brain) -->
  <circle cx="256" cy="240" r="28" fill="#1a1a3e" stroke="#FFD700" stroke-width="2"/>
  <circle cx="256" cy="240" r="12" fill="#FFD700" opacity="0.6"/>
  <circle cx="256" cy="240" r="6" fill="#FFF" opacity="0.8"/>
  
  <!-- "SE" text subtle -->
  <text x="256" y="450" text-anchor="middle" fill="#FFD700" font-family="SF Pro Display, Helvetica, sans-serif" font-size="36" font-weight="700" opacity="0.5">SE</text>
</svg>
